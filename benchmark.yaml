# Benchmark configuration — tracked base config
# Repo-local paths are relative to repo root. Put machine-specific overrides in benchmark.local.yaml.

benchmarkName: swiftui-docs-chatbot-benchmark
runId: auto   # Set an explicit value for resumable / idempotent runs.

# Candidate model execution path: direct OpenRouter HTTP or pi SDK sessions
transport:
  kind: openrouter               # openrouter | pi
  openRouterUseStructuredOutputs: false
  openRouterRetryDelaysMs: [3000, 10000, 20000]

# Candidate benchmark models
models:
  candidates:
    - openrouter/nvidia/nemotron-3-super-120b-a12b:nitro

# Judge configuration
judge:
  model: openai-codex/gpt-5.4
  transport:
    kind: pi
    session:
      compaction: false
      retry: false
      maxRetries: 0
      thinkingLevel: medium
  retry:
    maxAttempts: 3
    initialDelayMs: 2000
    backoffMultiplier: 2
    maxDelayMs: 15000
    jitterMs: 250
  profile:
    id: semantic-judge-v1
    version: 1.0.0
    description: Corpus-assisted semantic answer judge that evaluates the candidate answer against the benchmark question.
    toolSetName: read_grep_glob
    promptTemplateId: judge-answer-v1
    promptTemplateVersion: v1
    responseSchemaVersion: judge-verdict.v1

# Paths
paths:
  dataset: benchmark/dataset/swiftui-docs-chatbot-benchmark.v1.json
  toolSets: benchmark/tool-sets/tool-sets.v1.json
  rubric: benchmark/rubric/rubric.v1.json
  promptTemplates:
    benchmark-answer-v1: benchmark/prompts/benchmark-answer-v1.md
    judge-answer-v1: benchmark/prompts/judge-answer-v1.md

# Corpus
corpus:
  snapshotId: swift-docs-2026-04-10
  rootDir: corpus/swift-docs-2026-04-10/swiftui-macos-corpus
  manifestPath: corpus/swift-docs-2026-04-10/manifest.json
  manifestSha256: d71285e0

# Optional local-only Swift Docs search config belongs in benchmark.local.yaml.

# Execution controls
execution:
  resume: true                    # true = skip completed runs and continue partial executions when runId is explicit
  stopOnError: false              # false = keep going and record failures instead of aborting the whole matrix
  maxParseRetries: 3              # retry collect-stage normalization failures up to N times before recording the failure
  answerCollectionMode: lazy_text # structured_json = require JSON answer contract; lazy_text = accept plain answers and extract fields when possible
  questionConcurrency: 5          # max concurrent question pipelines per benchmark invocation
  questionStartSpacingMs: 750     # stagger collect starts a bit to reduce bursty provider traffic
  collectRetry:
    maxAttempts: 4
    initialDelayMs: 5000
    backoffMultiplier: 2
    maxDelayMs: 45000
    jitterMs: 1000

# Batch controls
batch:
  size: 10                        # null = all selected questions, or a positive integer batch size
  number: all                     # all = queue every incomplete batch in one invocation; auto = only the next incomplete batch

# System prompts
systemPrompts:
  collect: "You are a benchmark runner. Follow the active answer-format instructions exactly."
  judge: "You are a benchmark judge. Follow the response schema exactly."

# Run matrix: which modes to run + default toolSet per mode
# Use --tool-set=swift_docs_search_read for the new opinionated search+read flow,
# or --tool-set=swift_docs_hybrid for the legacy low-level hybrid tool.
modes:
  open_book: read_grep
  closed_book: none

# Question selection: "all" or list of question IDs
questions: all
