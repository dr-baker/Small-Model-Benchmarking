# Benchmark configuration — single source of truth
# All paths relative to repo root

benchmarkName: swiftui-docs-chatbot-benchmark
runId: nemotron3-super-openrouter-v1   # Supported execution id location. Set an explicit value for resumable / idempotent runs.

# Candidate model execution path: direct OpenRouter HTTP or pi SDK sessions
transport:
  kind: openrouter               # openrouter | pi

# Candidate benchmark models
models:
  candidates:
    - openrouter/nvidia/nemotron-3-super-120b-a12b:nitro

# Judge configuration
judge:
  model: openai-codex/gpt-5.4
  transport:
    kind: pi
    session:
      compaction: false
      retry: false
      maxRetries: 0
      thinkingLevel: medium
  profile:
    id: semantic-judge-v1
    version: 1.0.0
    description: Corpus-assisted semantic answer judge that evaluates the candidate answer against the benchmark question.
    toolSetName: read_grep_glob
    promptTemplateId: judge-answer-v1
    promptTemplateVersion: v1
    responseSchemaVersion: judge-verdict.v1

# Paths
paths:
  dataset: dataset/swiftui-docs-chatbot-benchmark.v1.json
  toolSets: tool-sets/tool-sets.v1.json
  rubric: rubric/rubric.v1.json
  promptTemplates:
    benchmark-answer-v1: prompts/benchmark-answer-v1.md
    judge-answer-v1: prompts/judge-answer-v1.md

# Corpus
corpus:
  snapshotId: swift-docs-2026-04-10
  rootDir: corpus/swift-docs-2026-04-10/swiftui-macos-corpus
  manifestPath: corpus/swift-docs-2026-04-10/manifest.json
  manifestSha256: d71285e0

# Execution controls
execution:
  resume: true                   # true = skip completed runs and continue partial executions when runId is explicit
  stopOnError: false             # false = keep going and record failures instead of aborting the whole matrix
  maxParseRetries: 3             # retry collect-stage schema parse failures up to N times before recording the failure

# Batch controls
batch:
  size: 10                       # null = all selected questions, or a positive integer batch size
  number: auto                   # 1-based batch number, or auto to pick the next incomplete batch from artifacts

# System prompts
systemPrompts:
  collect: "You are a benchmark runner. Follow the response schema exactly."
  judge: "You are a benchmark judge. Follow the response schema exactly."

# Run matrix: which modes to run + default toolSet per mode
modes:
  open_book: read_grep
  closed_book: none

# Question selection: "all" or list of question IDs
questions: all
